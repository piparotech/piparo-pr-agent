[pr_reviewer]
enable_review_labels_effort = true
enable_auto_approval = true

[github_app]
pr_commands = [
    "/describe --pr_description.publish_description_as_comment=true",
    "/improve",
    "/agentic_review"
]

handle_push_trigger = true
push_commands = [
    "/improve",
    "/agentic_review"
]

[review_agent]
enabled = true
publish_output = true

[pr_code_suggestions]
demand_code_suggestions_self_review = true
code_suggestions_self_review_text = "**Author self-review**: I have read the low-impact PR code suggestions and addressed the relevant ones."
