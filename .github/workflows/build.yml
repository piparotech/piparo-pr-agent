name: Build and deploy image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: piparo-pr-agent-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/piparotech/piparo-pr-agent
  INFRA_REPOSITORY: piparotech/infra
  INFRA_MANIFEST: pr-agent/pr-agent.yaml

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set YYYY-MM-DD image tag
        id: image-tag
        run: echo "tag=$(date -u +%F)" >> "$GITHUB_OUTPUT"

      - name: Set creation timestamp
        id: created
        run: echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.created.outputs.timestamp }}
          cache-from: type=gha,scope=piparo-pr-agent
          cache-to: type=gha,mode=max,scope=piparo-pr-agent

  update-infra:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
    env:
      DEPLOY_PAT: ${{ secrets.DEPLOY_PAT }}
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
    steps:
      - name: Require deploy token
        run: |
          if [ -z "$DEPLOY_PAT" ]; then
            echo "DEPLOY_PAT is required to update piparotech/infra." >&2
            exit 1
          fi

      - name: Checkout infra repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRA_REPOSITORY }}
          token: ${{ secrets.DEPLOY_PAT }}
          path: infra-repo

      - name: Update PR-Agent image tag
        id: update
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          manifest = Path("infra-repo") / os.environ["INFRA_MANIFEST"]
          image = f"{os.environ['IMAGE_NAME']}:{os.environ['IMAGE_TAG']}"
          lines = manifest.read_text(encoding="utf-8").splitlines(keepends=True)

          in_pr_agent_container = False
          updated = False
          for index, line in enumerate(lines):
              if re.match(r"\s*-\s*name:\s*pr-agent\s*$", line):
                  in_pr_agent_container = True
                  continue
              if not in_pr_agent_container:
                  continue
              if re.match(r"\s*-\s*name:\s+", line):
                  in_pr_agent_container = False
                  continue
              if re.match(r"\s*image:\s+", line):
                  indent = line.split("image:", 1)[0]
                  lines[index] = f"{indent}image: {image}\n"
                  updated = True
                  break

          if not updated:
              raise SystemExit(f"Could not find pr-agent container image in {manifest}")

          manifest.write_text("".join(lines), encoding="utf-8")
          PY

          if git -C infra-repo diff --quiet -- "$INFRA_MANIFEST"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push infra change
        if: steps.update.outputs.changed == 'true'
        run: |
          git -C infra-repo config user.name "github-actions[bot]"
          git -C infra-repo config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C infra-repo add "$INFRA_MANIFEST"
          git -C infra-repo commit -m "Deploy PR-Agent ${IMAGE_TAG}"
          git -C infra-repo push

      - name: Write deployment summary
        if: always()
        run: |
          {
            echo "### piparo-pr-agent deploy"
            echo "- Image: \`${IMAGE_NAME}:${IMAGE_TAG}\`"
            echo "- Infra manifest: \`${INFRA_MANIFEST}\`"
            echo "- Infra changed: \`${{ steps.update.outputs.changed || 'false' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
